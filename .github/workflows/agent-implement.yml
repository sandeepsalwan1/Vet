name: Agent Implement

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
    secrets:
      OPENAI_API_KEY:
        required: true
      VERCEL_TOKEN:
        required: false
      VERCEL_OIDC_TOKEN:
        required: false
      HCLOUD_TOKEN:
        required: false
      HETZNER_TOKEN:
        required: false
      HETZNER_API_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: agent-implement-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  prepare-prompt:
    name: prepare-prompt
    runs-on: ubuntu-latest
    outputs:
      backend-effort: ${{ steps.backend.outputs.effort }}
      backend-model: ${{ steps.backend.outputs.model }}
      backend-sandbox: ${{ steps.backend.outputs.sandbox }}
      concurrency-group: ${{ steps.concurrency.outputs.group }}
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Select bounded implementation slot
        id: concurrency
        env:
          CONCURRENCY_KEY: ${{ inputs.issue-number }}
        run: node scripts/agent-concurrency-slot.mjs --lane implement --key "$CONCURRENCY_KEY" --json
      - name: Validate configured implementation backend
        id: backend
        run: node scripts/agent-worker.mjs --validate-backend --lane implement --json
      - name: Build trusted implementation prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-implement.mjs
          --issue-number "${{ inputs.issue-number }}"
          --write-prompt .agent-output/implement-prompt.md
          --json
      - uses: actions/upload-artifact@v7
        with:
          name: agent-implementation-context-${{ inputs.issue-number }}
          path: |
            .agent-output/implement-prompt.md
            .agent-output/implementation-intent.json
          include-hidden-files: true
          if-no-files-found: error

  generate-patch-remote:
    name: generate-patch-remote
    needs: prepare-prompt
    if: vars.CRABBOX_VERCEL_READY == 'true' || vars.CRABBOX_HETZNER_READY == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    outputs:
      generated: ${{ steps.generate.outcome == 'success' && steps.implementation-artifact.outcome == 'success' }}
    concurrency:
      group: ${{ needs.prepare-prompt.outputs.concurrency-group }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-context-${{ inputs.issue-number }}
          path: .agent-output
      - name: Install pinned Crabbox
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          download="$RUNNER_TEMP/crabbox-download"
          bin="$RUNNER_TEMP/crabbox-bin"
          mkdir -p "$download" "$bin"
          gh release download v0.40.0 --repo openclaw/crabbox --pattern crabbox_0.40.0_linux_amd64.tar.gz --pattern checksums.txt --dir "$download"
          (cd "$download" && sha256sum --check --ignore-missing checksums.txt)
          tar -xzf "$download/crabbox_0.40.0_linux_amd64.tar.gz" -C "$bin"
          chmod 755 "$bin/crabbox"
          echo "$bin" >> "$GITHUB_PATH"
      - name: Install pinned Vercel Sandbox bridge
        if: vars.CRABBOX_VERCEL_READY == 'true'
        run: |
          bridge_dir="$RUNNER_TEMP/crabbox-vercel-bridge"
          bridge="$RUNNER_TEMP/crabbox-vercel-sandbox-bridge"
          mkdir -p "$bridge_dir"
          cp .agent/crabbox-vercel-bridge/package.json .agent/crabbox-vercel-bridge/package-lock.json "$bridge_dir/"
          (cd "$bridge_dir" && npm ci --ignore-scripts --no-audit --no-fund)
          echo '#!/bin/sh' > "$bridge"
          echo "cd '$bridge_dir'" >> "$bridge"
          echo 'exec crabbox __vercel-sandbox-bridge "$@"' >> "$bridge"
          chmod 755 "$bridge"
          echo "CRABBOX_VERCEL_SANDBOX_BRIDGE=$bridge" >> "$GITHUB_ENV"
      - name: Generate patch in Crabbox
        id: generate
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          CRABBOX_VERCEL_READY: ${{ vars.CRABBOX_VERCEL_READY }}
          CRABBOX_HETZNER_READY: ${{ vars.CRABBOX_HETZNER_READY }}
          REMOTE_COMMAND: >-
            agent_key="$CODEX_API_KEY"; unset CODEX_API_KEY OPENAI_API_KEY;
            git init --quiet &&
            git config user.name "Agent Worker" &&
            git config user.email "agent@example.invalid" &&
            git add --all &&
            git commit --quiet --no-verify -m "chore: seed remote workspace" &&
            npm install --global --ignore-scripts --no-audit --no-fund @openai/codex@0.144.1 &&
            CODEX_API_KEY="$agent_key" node scripts/agent-worker.mjs
            --sandbox danger-full-access
            --prompt-file .agent-output/implement-prompt.md
            --output-file .agent-output/implementation.md &&
            unset agent_key && node scripts/agent-implement.mjs
            --issue-number "${{ inputs.issue-number }}"
            --create-patch .agent-output/codex.patch --json
        run: node scripts/agent-crabbox-run.mjs --lane implementRemote --command "$REMOTE_COMMAND" --json
      - id: implementation-artifact
        uses: actions/upload-artifact@v7
        if: steps.generate.outcome == 'success'
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output/*
          include-hidden-files: true
          if-no-files-found: error
      - name: Upload redacted remote diagnostics
        if: always() && (steps.generate.outcome != 'success' || steps.implementation-artifact.outcome != 'success')
        uses: actions/upload-artifact@v7
        with:
          name: agent-implementation-remote-diagnostics-${{ inputs.issue-number }}
          path: |
            .agent-output/crabbox-implementRemote-*.json
            .agent-output/crabbox-implementRemote-*.log
          include-hidden-files: true
          if-no-files-found: warn
      - name: Report GitHub fallback
        if: always() && (steps.generate.outcome != 'success' || steps.implementation-artifact.outcome != 'success')
        run: echo "::warning::Remote Crabbox generation failed; continuing with the isolated GitHub implementer."

  generate-patch:
    name: generate-patch
    needs:
      - prepare-prompt
      - generate-patch-remote
    if: always() && needs.prepare-prompt.result == 'success' && needs.generate-patch-remote.outputs.generated != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    concurrency:
      group: ${{ needs.prepare-prompt.outputs.concurrency-group }}
      cancel-in-progress: false
      queue: max
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-context-${{ inputs.issue-number }}
          path: .agent-output
      - name: Run Codex implementer
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-version: "0.144.1"
          prompt-file: .agent-output/implement-prompt.md
          sandbox: ${{ needs.prepare-prompt.outputs.backend-sandbox }}
          model: ${{ needs.prepare-prompt.outputs.backend-model }}
          effort: ${{ needs.prepare-prompt.outputs.backend-effort }}
          allow-users: ${{ github.repository_owner }}
          allow-bots: true
          output-file: .agent-output/implementation.md
      - name: Create patch artifact
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --create-patch .agent-output/codex.patch --json
      - uses: actions/upload-artifact@v7
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output/*
          include-hidden-files: true
          if-no-files-found: error

  validate-patch:
    name: validate-patch
    runs-on: ubuntu-latest
    needs:
      - generate-patch-remote
      - generate-patch
    if: always() && (needs.generate-patch-remote.outputs.generated == 'true' || needs.generate-patch.result == 'success')
    permissions:
      contents: read
    env:
      DOCKER_IMAGE: node:22-bookworm@sha256:a25c9934ff6382cd4f08b6bc26c82bf4ea69b1e6f8dabfb2ead457374127c365
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      # Install the trusted base without lifecycle code. Rebuild lifecycle
      # dependencies offline in a credential-free container before the patch exists.
      - name: Install dependencies without host lifecycle scripts
        run: |
          stop_token="$(openssl rand -hex 32)"
          printf '::stop-commands::%s\n' "$stop_token"
          restore_commands() { printf '::%s::\n' "$stop_token"; }
          trap restore_commands EXIT
          env -u GH_TOKEN -u GITHUB_TOKEN -u AGENT_PAT \
            -u OPENAI_API_KEY -u CODEX_API_KEY \
            -u ACTIONS_RUNTIME_TOKEN -u ACTIONS_ID_TOKEN_REQUEST_TOKEN -u ACTIONS_ID_TOKEN_REQUEST_URL \
            -u GITHUB_ENV -u GITHUB_OUTPUT -u GITHUB_PATH -u GITHUB_STEP_SUMMARY \
            npm ci --ignore-scripts --no-audit --no-fund
      - name: Rebuild dependencies offline and isolated
        run: |
          docker pull "$DOCKER_IMAGE"
          stop_token="$(openssl rand -hex 32)"
          printf '::stop-commands::%s\n' "$stop_token"
          restore_commands() { printf '::%s::\n' "$stop_token"; }
          trap restore_commands EXIT
          docker run --rm \
            --network none \
            --user "$(id -u):$(id -g)" \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --read-only \
            --mount "type=bind,src=$PWD,dst=/workspace,readonly" \
            --mount "type=bind,src=$PWD/node_modules,dst=/workspace/node_modules" \
            --mount type=tmpfs,dst=/tmp,tmpfs-mode=1777 \
            --workdir /workspace \
            --env HOME=/tmp/home \
            --env npm_config_cache=/tmp/npm-cache \
            --env npm_config_nodedir=/usr/local \
            "$DOCKER_IMAGE" \
            npm rebuild --offline --no-audit --no-fund
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output
      - name: Prepare pristine candidate tree
        run: >-
          node scripts/agent-implement.mjs
          --issue-number "${{ inputs.issue-number }}"
          --prepare-validation .agent-output/codex.patch
          --codex-output .agent-output/implementation.md
          --prepared-metadata "$RUNNER_TEMP/implementation-prepared.json"
          --candidate-dir "$RUNNER_TEMP/implementation-candidate"
          --json
      # Candidate code can write only its disposable tree. It has no network,
      # credentials, workflow command paths, artifact directory, or writable dependencies.
      - name: Run candidate checks in isolated container
        run: |
          stop_token="$(openssl rand -hex 32)"
          printf '::stop-commands::%s\n' "$stop_token"
          restore_commands() { printf '::%s::\n' "$stop_token"; }
          trap restore_commands EXIT
          docker run --rm \
            --network none \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --read-only \
            --mount "type=bind,src=$RUNNER_TEMP/implementation-candidate,dst=/workspace" \
            --mount "type=bind,src=$PWD/node_modules,dst=/workspace/node_modules,readonly" \
            --mount type=tmpfs,dst=/tmp,tmpfs-mode=1777 \
            --workdir /workspace \
            --env AGENT_VALIDATION_CONTAINER=1 \
            --env CI=true \
            --env HOME=/tmp/home \
            --env npm_config_cache=/tmp/npm-cache \
            "$DOCKER_IMAGE" \
            node scripts/agent-implement.mjs \
              --issue-number "${{ inputs.issue-number }}" \
              --run-validation-checks \
              --json
      - name: Reverify and seal validated artifact
        run: >-
          node scripts/agent-implement.mjs
          --issue-number "${{ inputs.issue-number }}"
          --finalize-validation .agent-output/codex.patch
          --codex-output .agent-output/implementation.md
          --prepared-metadata "$RUNNER_TEMP/implementation-prepared.json"
          --write-manifest .agent-output/integrity.json
          --json
      - uses: actions/upload-artifact@v7
        with:
          name: agent-implementation-validated-${{ inputs.issue-number }}
          path: |
            .agent-output/codex.patch
            .agent-output/implementation.md
            .agent-output/integrity.json
          include-hidden-files: true
          if-no-files-found: error

  open-pr:
    name: open-pr
    runs-on: ubuntu-latest
    needs: validate-patch
    if: always() && needs.validate-patch.result == 'success'
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-validated-${{ inputs.issue-number }}
          path: .agent-output
      - name: Apply patch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-implement.mjs
          --issue-number "${{ inputs.issue-number }}"
          --apply-patch .agent-output/codex.patch
          --codex-output .agent-output/implementation.md
          --integrity-manifest .agent-output/integrity.json
          --json

  report-failure:
    name: report-failure
    runs-on: ubuntu-latest
    needs:
      - generate-patch-remote
      - generate-patch
      - validate-patch
      - open-pr
    if: always() && needs.open-pr.result != 'success'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - name: Record implementation blocker
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --mark-failed --json
