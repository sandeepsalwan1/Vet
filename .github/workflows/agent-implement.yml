name: Agent Implement

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
    secrets:
      OPENAI_API_KEY:
        required: true
      VERCEL_TOKEN:
        required: false
      VERCEL_OIDC_TOKEN:
        required: false
      HCLOUD_TOKEN:
        required: false
      HETZNER_TOKEN:
        required: false
      HETZNER_API_TOKEN:
        required: false
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: agent-implement-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  generate-patch-remote:
    name: generate-patch-remote
    if: vars.CRABBOX_VERCEL_READY == 'true' || vars.CRABBOX_HETZNER_READY == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: mkdir -p .agent-output
      - name: Build implement prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --write-prompt .agent-output/implement-prompt.md --json
      - name: Install pinned Crabbox
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          download="$RUNNER_TEMP/crabbox-download"
          bin="$RUNNER_TEMP/crabbox-bin"
          mkdir -p "$download" "$bin"
          gh release download v0.38.0 --repo openclaw/crabbox --pattern crabbox_0.38.0_linux_amd64.tar.gz --pattern checksums.txt --dir "$download"
          (cd "$download" && sha256sum --check --ignore-missing checksums.txt)
          tar -xzf "$download/crabbox_0.38.0_linux_amd64.tar.gz" -C "$bin"
          chmod 755 "$bin/crabbox"
          echo "$bin" >> "$GITHUB_PATH"
      - name: Install pinned Vercel Sandbox bridge
        if: vars.CRABBOX_VERCEL_READY == 'true'
        run: |
          bridge_dir="$RUNNER_TEMP/crabbox-vercel-bridge"
          bridge="$RUNNER_TEMP/crabbox-vercel-sandbox-bridge"
          npm install --prefix "$bridge_dir" --no-save --package-lock=false @vercel/sandbox@2.6.0 sandbox@3.4.2
          echo '#!/bin/sh' > "$bridge"
          echo "cd '$bridge_dir'" >> "$bridge"
          echo 'exec crabbox __vercel-sandbox-bridge "$@"' >> "$bridge"
          chmod 755 "$bridge"
          echo "CRABBOX_VERCEL_SANDBOX_BRIDGE=$bridge" >> "$GITHUB_ENV"
      - name: Generate patch in Crabbox
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_OIDC_TOKEN: ${{ secrets.VERCEL_OIDC_TOKEN }}
          HCLOUD_TOKEN: ${{ secrets.HCLOUD_TOKEN }}
          HETZNER_TOKEN: ${{ secrets.HETZNER_TOKEN }}
          HETZNER_API_TOKEN: ${{ secrets.HETZNER_API_TOKEN }}
          CRABBOX_VERCEL_READY: ${{ vars.CRABBOX_VERCEL_READY }}
          CRABBOX_HETZNER_READY: ${{ vars.CRABBOX_HETZNER_READY }}
          REMOTE_COMMAND: >-
            agent_key="$CODEX_API_KEY"; unset CODEX_API_KEY OPENAI_API_KEY;
            npm ci && npm install --global @openai/codex@0.144.1 &&
            CODEX_API_KEY="$agent_key" node scripts/agent-worker.mjs
            --prompt-file .agent-output/implement-prompt.md
            --output-file .agent-output/implementation.md &&
            unset agent_key && node scripts/agent-implement.mjs
            --issue-number "${{ inputs.issue-number }}"
            --create-patch .agent-output/codex.patch --json
        run: node scripts/agent-crabbox-run.mjs --lane implementRemote --command "$REMOTE_COMMAND" --json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output/*
          if-no-files-found: error

  generate-patch:
    name: generate-patch
    needs: generate-patch-remote
    if: always() && needs.generate-patch-remote.result != 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: mkdir -p .agent-output
      - name: Build implement prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --write-prompt .agent-output/implement-prompt.md --json
      - name: Run Codex implementer
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-output/implement-prompt.md
          sandbox: workspace-write
          effort: medium
          allow-users: ${{ github.repository_owner }}
          allow-bots: true
          output-file: .agent-output/implementation.md
      - name: Create patch artifact
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --create-patch .agent-output/codex.patch --json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output/*
          if-no-files-found: error

  open-pr:
    name: open-pr
    runs-on: ubuntu-latest
    needs:
      - generate-patch-remote
      - generate-patch
    if: always() && (needs.generate-patch-remote.result == 'success' || needs.generate-patch.result == 'success')
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output
      - name: Apply patch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --apply-patch .agent-output/codex.patch --codex-output .agent-output/implementation.md --json

  report-failure:
    name: report-failure
    runs-on: ubuntu-latest
    needs:
      - generate-patch-remote
      - generate-patch
      - open-pr
    if: always() && needs.open-pr.result != 'success'
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - name: Record implementation blocker
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --mark-failed --json
