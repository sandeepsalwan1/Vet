name: Agent Implement

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number

permissions:
  contents: read

concurrency:
  group: agent-implement-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  generate-patch:
    name: generate-patch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: mkdir -p .agent-output
      - name: Build implement prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --write-prompt .agent-output/implement-prompt.md --json
      - name: Run Codex implementer
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-output/implement-prompt.md
          sandbox: workspace-write
          effort: medium
          allow-users: ${{ github.repository_owner }}
          allow-bots: github-actions[bot]
          output-file: .agent-output/implementation.md
      - name: Create patch artifact
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --create-patch .agent-output/codex.patch --json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output/*
          if-no-files-found: error

  open-pr:
    name: open-pr
    runs-on: ubuntu-latest
    needs: generate-patch
    permissions:
      actions: write
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: agent-implementation-${{ inputs.issue-number }}
          path: .agent-output
      - name: Apply patch and open PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-implement.mjs --issue-number "${{ inputs.issue-number }}" --apply-patch .agent-output/codex.patch --codex-output .agent-output/implementation.md --json
