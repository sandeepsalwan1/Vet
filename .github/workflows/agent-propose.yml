name: Agent Propose

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: agent-propose
  cancel-in-progress: false

jobs:
  generate:
    name: generate proposals
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: mkdir -p .agent-output
      - name: Run Codex proposer
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          codex-version: "0.144.1"
          prompt-file: .agent/prompts/propose.md
          sandbox: read-only
          effort: low
          allow-users: ${{ github.repository_owner }}
          allow-bots: true
          codex-args: '["--output-schema",".agent/schemas/proposals.schema.json"]'
          output-file: .agent-output/proposals.json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-proposals
          path: .agent-output/proposals.json
          include-hidden-files: true
          if-no-files-found: error

  apply:
    name: apply proposals
    needs: generate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: agent-proposals
          path: .agent-output
      - name: Create proposed issues
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-propose.mjs --from-file .agent-output/proposals.json --json
