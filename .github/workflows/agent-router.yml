name: Agent Router

on:
  issues:
    types:
      - labeled
  pull_request:
    types:
      - labeled
  workflow_dispatch:
    inputs:
      event-file:
        description: Optional event JSON path for manual route dry-run
        required: false

permissions:
  actions: write
  contents: read
  issues: read
  pull-requests: read

concurrency:
  group: agent-router-${{ github.event.issue.number || github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  route:
    name: route
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: route
        env:
          EVENT_FILE_INPUT: ${{ github.event.inputs['event-file'] || '' }}
        run: |
          args=(--json)
          if [ -n "$EVENT_FILE_INPUT" ]; then
            args+=(--event-file "$EVENT_FILE_INPUT")
          fi
          node scripts/agent-router.mjs "${args[@]}"
      - name: Dispatch route
        if: steps.route.outputs.lane != 'none'
        env:
          GH_TOKEN: ${{ github.token }}
          LANE: ${{ steps.route.outputs.lane }}
          ISSUE_NUMBER: ${{ steps.route.outputs.issue_number }}
          PR_NUMBER: ${{ steps.route.outputs.pr_number }}
          TARGET_KIND: ${{ steps.route.outputs.target_kind }}
          TARGET_NUMBER: ${{ steps.route.outputs.target_number }}
        run: |
          set -euo pipefail
          head_sha=""
          if [ -n "$PR_NUMBER" ]; then
            head_sha="$(gh api "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER" --jq .head.sha)"
            [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]]
          fi
          case "$LANE" in
            triage)
              gh workflow run agent-triage.yml --repo "$GITHUB_REPOSITORY" -f issue-number="$ISSUE_NUMBER"
              ;;
            implement)
              gh workflow run agent-implement.yml --repo "$GITHUB_REPOSITORY" -f issue-number="$ISSUE_NUMBER"
              ;;
            review)
              gh workflow run agent-review.yml --repo "$GITHUB_REPOSITORY" --ref main -f pr-number="$PR_NUMBER" -f expected-head-sha="$head_sha"
              ;;
            proof)
              if [ "$TARGET_KIND" = pr ]; then
                gh workflow run agent-proof.yml --repo "$GITHUB_REPOSITORY" --ref main -f target-kind=pr -f target-number="$TARGET_NUMBER" -f expected-head-sha="$head_sha"
              else
                gh workflow run agent-proof.yml --repo "$GITHUB_REPOSITORY" --ref main -f target-kind=issue -f target-number="$TARGET_NUMBER"
              fi
              ;;
            automerge)
              gh workflow run agent-automerge.yml --repo "$GITHUB_REPOSITORY" --ref main -f pr-number="$PR_NUMBER" -f expected-head-sha="$head_sha"
              ;;
            *)
              echo "No dispatch for lane $LANE"
              ;;
          esac
