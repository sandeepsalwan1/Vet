name: Agent Review

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        required: false
        type: string
        default: ""
      repair-attempt:
        required: false
        type: number
        default: 0
    secrets:
      OPENAI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        description: Exact current pull request head SHA
        required: false
        type: string
        default: ""
      repair-attempt:
        description: Bounded automated repair attempt
        required: false
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: agent-review-${{ inputs.pr-number }}
  cancel-in-progress: false

jobs:
  prepare-review:
    name: prepare-review
    runs-on: ubuntu-latest
    outputs:
      backend-effort: ${{ steps.backend.outputs.effort }}
      backend-model: ${{ steps.backend.outputs.model }}
      concurrency-group: ${{ steps.concurrency.outputs.group }}
      reviewed-head-sha: ${{ steps.mark-pending.outputs.head-sha }}
    permissions:
      actions: write
      checks: read
      contents: read
      pull-requests: read
      issues: read
      statuses: write
    steps:
      - name: Capture review head and mark pending
        id: mark-pending
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr-number }}
          REQUESTED_HEAD_SHA: ${{ inputs.expected-head-sha }}
        run: |
          set -euo pipefail
          sha="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)"
          [[ "$sha" =~ ^[0-9a-f]{40}$ ]]
          if [ -n "$REQUESTED_HEAD_SHA" ]; then
            [[ "$REQUESTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
            test "$sha" = "$REQUESTED_HEAD_SHA"
          fi
          printf 'head-sha=%s\n' "$sha" >> "$GITHUB_OUTPUT"
          gh api "repos/$GITHUB_REPOSITORY/statuses/$sha" \
            --method POST \
            -f state=pending \
            -f context=agent-review \
            -f description='agent review running' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Select review model
        id: backend
        run: node scripts/agent-worker.mjs --validate-backend --lane review --json
      - name: Allocate review capacity
        id: concurrency
        env:
          CONCURRENCY_KEY: ${{ inputs.pr-number }}
        run: node scripts/agent-concurrency-slot.mjs --lane review --key "$CONCURRENCY_KEY" --json
      - name: Validate review target and build prompt
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEWED_HEAD_SHA: ${{ steps.mark-pending.outputs.head-sha }}
        run: >-
          node scripts/agent-review.mjs
          --pr-number "${{ inputs.pr-number }}"
          --expected-head-sha "$REVIEWED_HEAD_SHA"
          --wait-for-ci
          --json
      - name: Build exact-head review prompt
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEWED_HEAD_SHA: ${{ steps.mark-pending.outputs.head-sha }}
        run: >-
          node scripts/agent-review.mjs
          --pr-number "${{ inputs.pr-number }}"
          --expected-head-sha "$REVIEWED_HEAD_SHA"
          --write-prompt .agent-output/review-prompt.md
          --json
      - name: Dispatch trusted pull request CodeQL
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEWED_HEAD_SHA: ${{ steps.mark-pending.outputs.head-sha }}
        run: >-
          node scripts/agent-review.mjs
          --pr-number "${{ inputs.pr-number }}"
          --expected-head-sha "$REVIEWED_HEAD_SHA"
          --dispatch-pr-security
          --json
      - run: cp .agent/schemas/review.schema.json .agent-output/review.schema.json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-review-context-${{ inputs.pr-number }}
          path: |
            .agent-output/review-prompt.md
            .agent-output/review.schema.json
          include-hidden-files: true
          if-no-files-found: error

  generate-review:
    name: generate-review
    needs: prepare-review
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ needs.prepare-review.outputs.concurrency-group }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
      pull-requests: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare-review.outputs.reviewed-head-sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: agent-review-context-${{ inputs.pr-number }}
          path: .agent-output
      - name: Install trusted candidate dependencies before model auth
        run: npm ci --ignore-scripts --no-audit --no-fund
      - name: Run Codex reviewer
        uses: openai/codex-action@52fe01ec70a42f454c9d2ebd47598f9fd6893d56 # v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-output/review-prompt.md
          sandbox: workspace-write
          model: ${{ needs.prepare-review.outputs.backend-model }}
          effort: ${{ needs.prepare-review.outputs.backend-effort }}
          allow-users: ${{ github.repository_owner }}
          allow-bots: true
          codex-version: "0.144.1"
          output-schema-file: .agent-output/review.schema.json
          output-file: .agent-output/review.json
      - name: Capture reviewer fixes
        run: >-
          node scripts/agent-review.mjs
          --pr-number "${{ inputs.pr-number }}"
          --create-patch .agent-output/review.patch
          --json
      - uses: actions/upload-artifact@v4
        with:
          name: agent-review-result-${{ inputs.pr-number }}
          path: |
            .agent-output/review.json
            .agent-output/review.patch
          include-hidden-files: true
          if-no-files-found: error

  apply-review:
    name: apply-review
    runs-on: ubuntu-latest
    needs:
      - prepare-review
      - generate-review
    permissions:
      actions: write
      checks: read
      contents: write
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: agent-review-result-${{ inputs.pr-number }}
          path: .agent-output
      - name: Apply review result
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEWED_HEAD_SHA: ${{ needs.prepare-review.outputs.reviewed-head-sha }}
        run: >-
          node scripts/agent-review.mjs
          --pr-number "${{ inputs.pr-number }}"
          --expected-head-sha "$REVIEWED_HEAD_SHA"
          --from-file .agent-output/review.json
          --apply-patch .agent-output/review.patch
          --repair-attempt "${{ inputs.repair-attempt }}"
          --json

  dispatch-no-mistakes:
    name: dispatch no-mistakes
    needs: apply-review
    if: needs.apply-review.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      checks: read
      contents: read
      pull-requests: read
    steps:
      - name: Dispatch standalone no-mistakes gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ inputs.pr-number }}
        run: |
          set -euo pipefail
          head_sha="$(gh pr view "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)"
          [[ "$head_sha" =~ ^[0-9a-f]{40}$ ]]
          review_state="$(
            gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/status" \
              --jq '[.statuses[] | select(.context == "agent-review" and .creator.login == "github-actions[bot]")] | sort_by(.created_at) | last | .state // "missing"'
          )"
          if [ "$review_state" != success ]; then
            echo "Agent review is $review_state; no-mistakes waits for the repair cycle."
            exit 0
          fi
          required_checks=(quality build scenarios audit dependency-review)
          checks_file="$RUNNER_TEMP/review-checks.json"
          gh api "repos/$GITHUB_REPOSITORY/commits/$head_sha/check-runs?per_page=100" > "$checks_file"
          for check in "${required_checks[@]}"; do
            state="$(
              jq -r --arg check "$check" --arg sha "$head_sha" \
                '[.check_runs[] | select(.name == $check and .head_sha == $sha and .app.slug == "github-actions")] | sort_by(.started_at) | last | (.conclusion // .status // "missing")' \
                "$checks_file"
            )"
            if [ "$state" != success ]; then
              echo "Required check $check is $state; no-mistakes will not run."
              exit 0
            fi
          done
          gh workflow run agent-no-mistakes.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            -f pr-number="$PR_NUMBER" \
            -f expected-head-sha="$head_sha" \
            -f intent='Validate the agent-created PR after automated review. The PR must satisfy its linked issue, preserve repo architecture, pass CI, and remain blocked rather than auto-merged if no-mistakes finds ask-user or high-risk issues.'

  report-review-failure:
    name: report-review-failure
    runs-on: ubuntu-latest
    needs:
      - prepare-review
      - generate-review
      - apply-review
    if: >-
      always() &&
      needs.prepare-review.outputs.reviewed-head-sha != '' &&
      (needs.prepare-review.result != 'success' ||
      needs.generate-review.result != 'success' ||
      needs.apply-review.result != 'success')
    permissions:
      statuses: write
    steps:
      - name: Mark agent review failed
        env:
          GH_TOKEN: ${{ github.token }}
          REVIEWED_HEAD_SHA: ${{ needs.prepare-review.outputs.reviewed-head-sha }}
        run: |
          set -euo pipefail
          [[ "$REVIEWED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
          gh api "repos/$GITHUB_REPOSITORY/statuses/$REVIEWED_HEAD_SHA" \
            --method POST \
            -f state=failure \
            -f context=agent-review \
            -f description='agent review workflow failed' \
            -f target_url="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
