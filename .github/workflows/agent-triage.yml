name: Agent Triage

on:
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number
      resume-comment-id:
        required: false
        type: number
        default: 0

permissions:
  contents: read

concurrency:
  group: agent-triage-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare triage
    runs-on: ubuntu-latest
    outputs:
      concurrency-group: ${{ steps.concurrency.outputs.group }}
      should-continue: ${{ steps.triage.outputs.should_continue }}
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Allocate triage capacity
        id: concurrency
        env:
          CONCURRENCY_KEY: ${{ inputs.issue-number }}
        run: node scripts/agent-concurrency-slot.mjs --lane triage --key "$CONCURRENCY_KEY" --json
      - name: Capture trusted issue snapshot and mark pending
        id: triage
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-triage.mjs
          --issue-number "${{ inputs.issue-number }}"
          --prepare
          --lightweight
          --resume-comment-id "${{ inputs.resume-comment-id || 0 }}"
          --write-manifest .agent-output/triage-manifest.json
          --json
      - uses: actions/upload-artifact@v7
        if: steps.triage.outputs.should_continue == 'true'
        with:
          name: agent-triage-context-${{ inputs.issue-number }}
          path: .agent-output/*
          include-hidden-files: true
          if-no-files-found: error

  generate:
    name: generate lightweight triage
    needs: prepare
    if: needs.prepare.outputs.should-continue == 'true'
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ needs.prepare.outputs.concurrency-group }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
      issues: read
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/download-artifact@v4
        with:
          name: agent-triage-context-${{ inputs.issue-number }}
          path: .agent-output
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Write deterministic triage decision
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-triage.mjs
          --issue-number "${{ inputs.issue-number }}"
          --manifest .agent-output/triage-manifest.json
          --write-lightweight .agent-output/triage.json
          --json
      - uses: actions/upload-artifact@v7
        with:
          name: agent-triage-result-${{ inputs.issue-number }}
          path: .agent-output/triage.json
          include-hidden-files: true
          if-no-files-found: error

  apply:
    name: apply triage
    needs:
      - prepare
      - generate
    if: needs.prepare.outputs.should-continue == 'true'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/download-artifact@v4
        with:
          name: agent-triage-context-${{ inputs.issue-number }}
          path: .agent-output
      - uses: actions/download-artifact@v4
        with:
          name: agent-triage-result-${{ inputs.issue-number }}
          path: .agent-output
      - name: Apply triage only to the unchanged issue snapshot
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-triage.mjs
          --issue-number "${{ inputs.issue-number }}"
          --from-file .agent-output/triage.json
          --manifest .agent-output/triage-manifest.json
          --json

  finalize-failure:
    name: finalize triage failure
    needs:
      - prepare
      - generate
      - apply
    if: >-
      always() &&
      (needs.prepare.result != 'success' ||
      (needs.prepare.outputs.should-continue == 'true' &&
      (needs.generate.result != 'success' ||
      needs.apply.result != 'success')))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Record trusted triage failure
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-triage.mjs
          --issue-number "${{ inputs.issue-number }}"
          --mark-failed
          --json
