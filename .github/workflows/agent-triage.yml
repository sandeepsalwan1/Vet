name: Agent Triage

on:
  workflow_call:
    inputs:
      issue-number:
        required: true
        type: number
    secrets:
      OPENAI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: agent-triage-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  triage:
    name: triage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: mkdir -p .agent-output
      - name: Build triage prompt
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-triage.mjs --issue-number "${{ inputs.issue-number }}" --write-prompt .agent-output/triage-prompt.md --json
      - name: Run Codex triage
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .agent-output/triage-prompt.md
          sandbox: read-only
          effort: low
          allow-users: ${{ github.repository_owner }}
          allow-bots: true
          codex-args: '["--output-schema",".agent/schemas/triage.schema.json"]'
          output-file: .agent-output/triage.json
      - name: Apply triage labels
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-triage.mjs --issue-number "${{ inputs.issue-number }}" --from-file .agent-output/triage.json --json
