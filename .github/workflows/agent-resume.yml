name: Agent Resume

on:
  workflow_dispatch:
    inputs:
      issue-number:
        required: true
        type: number
      comment-id:
        required: true
        type: number

permissions:
  actions: write
  contents: read
  issues: write

concurrency:
  group: agent-resume-${{ inputs.issue-number }}
  cancel-in-progress: false

jobs:
  validate:
    name: validate owner reply
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      should-resume: ${{ steps.resume.outputs.should_resume }}
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - id: resume
        name: Validate exact owner reply
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-resume.mjs
          --issue-number "${{ inputs.issue-number }}"
          --comment-id "${{ inputs.comment-id }}"
          --json

  triage:
    name: resume deterministic triage
    needs: validate
    if: needs.validate.outputs.should-resume == 'true'
    permissions:
      actions: write
      contents: read
      issues: write
    uses: ./.github/workflows/agent-triage.yml
    with:
      issue-number: ${{ inputs.issue-number }}
      resume-comment-id: ${{ inputs.comment-id }}
