name: Agent Automerge

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        description: Exact current pull request head SHA
        required: false
        type: string
        default: ""
  workflow_run:
    workflows:
      - CI
      - Agent Proof
      - Agent Review
    types:
      - completed

permissions:
  actions: write
  contents: write
  pull-requests: write
  issues: write
  statuses: read
  checks: read

concurrency:
  group: agent-automerge-${{ inputs.pr-number || github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.head_branch || github.run_id }}
  cancel-in-progress: false

jobs:
  automerge:
    name: automerge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Resolve pull request
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_PR: ${{ inputs.pr-number }}
          EVENT_PR: ${{ github.event.workflow_run.pull_requests[0].number }}
          WORKFLOW_SHA: ${{ github.event.workflow_run.head_sha }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected-head-sha }}
        run: |
          set -euo pipefail
          pr_number="${REQUESTED_PR:-${EVENT_PR:-}}"
          if [ -z "$pr_number" ] && [ -n "${WORKFLOW_SHA:-}" ]; then
            pr_number="$(
              gh api --method GET "repos/$GITHUB_REPOSITORY/commits/$WORKFLOW_SHA/pulls" \
                --jq '[.[] | select(.state == "open")] | if length == 1 then .[0].number else empty end'
            )"
          fi
          if [ -n "$EXPECTED_HEAD_SHA" ]; then
            [[ "$EXPECTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ ]]
            test "$(gh pr view "$pr_number" --repo "$GITHUB_REPOSITORY" --json headRefOid --jq .headRefOid)" = "$EXPECTED_HEAD_SHA"
          fi
          echo "pr-number=$pr_number" >> "$GITHUB_OUTPUT"
      - name: Evaluate automerge
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.resolve.outputs.pr-number }}
          EXPECTED_HEAD_SHA: ${{ inputs.expected-head-sha }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No pull request associated with this workflow run; skipping automerge."
            exit 0
          fi
          args=(--pr-number "$PR_NUMBER" --json)
          if [ -n "$EXPECTED_HEAD_SHA" ]; then
            args+=(--expected-head "$EXPECTED_HEAD_SHA")
          fi
          node scripts/agent-automerge.mjs "${args[@]}"
