name: Agent Proof

on:
  workflow_call:
    inputs:
      target-kind:
        required: true
        type: string
      target-number:
        required: true
        type: number
      artifact-path:
        required: false
        type: string
        default: ""
      provider:
        required: false
        type: string
        default: ""
      lease-id:
        required: false
        type: string
        default: ""
  workflow_dispatch:
    inputs:
      target-kind:
        required: true
        type: choice
        options:
          - issue
          - pr
      target-number:
        required: true
        type: number
      artifact-path:
        required: false
        type: string
      provider:
        required: false
        type: string
      lease-id:
        required: false
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write
  statuses: write

concurrency:
  group: agent-proof-${{ inputs.target-kind }}-${{ inputs.target-number }}
  cancel-in-progress: false

jobs:
  proof:
    name: proof
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - name: Run proof
        env:
          GH_TOKEN: ${{ github.token }}
        run: node scripts/agent-proof.mjs --target-kind "${{ inputs.target-kind }}" --target-number "${{ inputs.target-number }}" --artifact-path "${{ inputs.artifact-path }}" --provider "${{ inputs.provider }}" --lease-id "${{ inputs.lease-id }}" --run --json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: agent-proof-${{ inputs.target-kind }}-${{ inputs.target-number }}
          path: .agent-output/*
          if-no-files-found: ignore
