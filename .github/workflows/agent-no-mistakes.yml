name: Agent no-mistakes

on:
  workflow_call:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        required: true
        type: string
      intent:
        required: true
        type: string
    secrets:
      OPENAI_API_KEY:
        required: true
  workflow_dispatch:
    inputs:
      pr-number:
        required: true
        type: number
      expected-head-sha:
        description: Exact current pull request head SHA
        required: true
        type: string
      intent:
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: agent-no-mistakes-${{ inputs.pr-number }}
  cancel-in-progress: false

jobs:
  prepare:
    name: prepare no-mistakes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      statuses: write
    outputs:
      backend_effort: ${{ steps.backend.outputs.effort }}
      backend_model: ${{ steps.backend.outputs.model }}
      concurrency_group: ${{ steps.concurrency.outputs.group }}
      head_ref: ${{ steps.prepare.outputs.head_ref }}
      head_sha: ${{ steps.prepare.outputs.head_sha }}
    steps:
      - name: Mark requested PR head pending
        id: pending
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_HEAD_SHA: ${{ inputs.expected-head-sha }}
        run: |
          set -euo pipefail
          pull_file="$RUNNER_TEMP/no-mistakes-pull.json"
          payload_file="$RUNNER_TEMP/no-mistakes-pending.json"
          gh api "repos/$GITHUB_REPOSITORY/pulls/${{ inputs.pr-number }}" > "$pull_file"
          head_repo="$(jq -r '.head.repo.full_name // ""' "$pull_file")"
          head_sha="$(jq -r '.head.sha // ""' "$pull_file")"
          if [[ "$head_repo" != "$GITHUB_REPOSITORY" || ! "$head_sha" =~ ^[0-9a-f]{40}$ || ! "$REQUESTED_HEAD_SHA" =~ ^[0-9a-f]{40}$ || "$head_sha" != "$REQUESTED_HEAD_SHA" ]]; then
            echo "refusing pending status for an untrusted PR head" >&2
            exit 1
          fi
          jq -n \
            --arg state pending \
            --arg context no-mistakes \
            --arg description "no-mistakes gate preparing" \
            --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}' \
            > "$payload_file"
          printf 'head_sha=%s\n' "$head_sha" >> "$GITHUB_OUTPUT"
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$head_sha" --input "$payload_file" >/dev/null
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Select no-mistakes model
        id: backend
        run: node scripts/agent-worker.mjs --validate-backend --lane no-mistakes --json
      - name: Allocate review capacity
        id: concurrency
        env:
          CONCURRENCY_KEY: ${{ inputs.pr-number }}
        run: node scripts/agent-concurrency-slot.mjs --lane review --key "$CONCURRENCY_KEY" --json
      - name: Validate trusted PR and mark pending
        id: prepare
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          node scripts/agent-no-mistakes-gate.mjs
          --pr-number "${{ inputs.pr-number }}"
          --expected-head "${{ inputs.expected-head-sha }}"
          --prepare
          --json
      - name: Record prepare failure
        if: ${{ always() && steps.pending.outputs.head_sha != '' && steps.prepare.outcome != 'success' }}
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ steps.pending.outputs.head_sha }}
        run: |
          set -euo pipefail
          payload_file="$RUNNER_TEMP/no-mistakes-prepare-failed.json"
          jq -n \
            --arg state failure \
            --arg context no-mistakes \
            --arg description "no-mistakes preparation failed" \
            --arg target_url "$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID" \
            '{state: $state, context: $context, description: $description, target_url: $target_url}' \
            > "$payload_file"
          gh api --method POST "repos/$GITHUB_REPOSITORY/statuses/$HEAD_SHA" --input "$payload_file" >/dev/null

  gate:
    name: run isolated no-mistakes
    needs: prepare
    runs-on: ubuntu-latest
    concurrency:
      group: ${{ needs.prepare.outputs.concurrency_group }}
      cancel-in-progress: false
      queue: max
    permissions:
      contents: read
      pull-requests: read
      issues: read
    env:
      DOCKER_IMAGE: node:22-bookworm@sha256:a25c9934ff6382cd4f08b6bc26c82bf4ea69b1e6f8dabfb2ead457374127c365
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          path: trusted
          persist-credentials: false
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.head_sha }}
          path: candidate
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Pin exact candidate branch
        env:
          HEAD_REF: ${{ needs.prepare.outputs.head_ref }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
        run: |
          test "$(git -C candidate rev-parse HEAD)" = "$HEAD_SHA"
          git -C candidate switch -C "$HEAD_REF" "$HEAD_SHA"
          test "$(git -C candidate rev-parse HEAD)" = "$HEAD_SHA"
      - name: Resolve trusted gate intent
        env:
          GATE_INTENT: ${{ inputs.intent }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
        run: >-
          node trusted/scripts/agent-no-mistakes-gate.mjs
          --pr-number "${{ inputs.pr-number }}"
          --prepare-gate
          --expected-head "$HEAD_SHA"
          --intent "$GATE_INTENT"
          --intent-file "$RUNNER_TEMP/no-mistakes-intent"
          --json
      # Dependency lifecycle code runs before agent auth and only inside a
      # credential-free container. The host npm invocation never runs scripts.
      - name: Install candidate dependencies before agent auth
        working-directory: candidate
        run: |
          env -u GH_TOKEN -u GITHUB_TOKEN -u AGENT_PAT -u OPENAI_API_KEY -u CODEX_API_KEY npm ci --ignore-scripts --no-audit --no-fund
          docker pull "$DOCKER_IMAGE"
          docker run --rm \
            --network none \
            --user "$(id -u):$(id -g)" \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --read-only \
            --mount "type=bind,src=$PWD,dst=/workspace,readonly" \
            --mount "type=bind,src=$PWD/node_modules,dst=/workspace/node_modules" \
            --mount type=tmpfs,dst=/tmp,tmpfs-mode=1777 \
            --workdir /workspace \
            --env HOME=/tmp/home \
            --env npm_config_cache=/tmp/npm-cache \
            --env npm_config_nodedir=/usr/local \
            "$DOCKER_IMAGE" \
            npm rebuild --offline --no-audit --no-fund
          git diff --exit-code
          git diff --cached --exit-code
      - name: Install pinned gate tools before agent auth
        env:
          NO_MISTAKES_TELEMETRY: "0"
        run: |
          npm install --global @openai/codex@0.144.1
          mkdir -p "$RUNNER_TEMP/no-mistakes-bin"
          curl -fsSL https://github.com/kunchenguid/no-mistakes/releases/download/v1.37.0/no-mistakes-v1.37.0-linux-amd64.tar.gz -o "$RUNNER_TEMP/no-mistakes.tar.gz"
          echo "29d000f6443997c4f65eb8cf42780d0b7e702fe5943dc17e737bfddcc6797bf4  $RUNNER_TEMP/no-mistakes.tar.gz" | sha256sum --check --strict
          tar -xzf "$RUNNER_TEMP/no-mistakes.tar.gz" -C "$RUNNER_TEMP/no-mistakes-bin"
          chmod 755 "$RUNNER_TEMP/no-mistakes-bin/no-mistakes"
          echo "$RUNNER_TEMP/no-mistakes-bin" >> "$GITHUB_PATH"
          codex exec \
            --sandbox read-only \
            -c 'approval_policy="never"' \
            -c 'shell_environment_policy.inherit="core"' \
            -c 'shell_environment_policy.ignore_default_excludes=false' \
            --help >/dev/null
      - name: Configure isolated gate home
        env:
          NM_HOME: ${{ runner.temp }}/no-mistakes
        run: |
          mkdir -p "$NM_HOME"
          umask 077
          cat > "$NM_HOME/config.yaml" <<'EOF'
          agent: codex
          session_reuse: false
          intent:
            enabled: false
          auto_fix:
            review: 0
          agent_args_override:
            codex:
              - --model
              - ${{ needs.prepare.outputs.backend_model }}
              - -c
              - 'model_reasoning_effort="${{ needs.prepare.outputs.backend_effort }}"'
              - --sandbox
              - read-only
              - -c
              - 'approval_policy="never"'
              - -c
              - 'shell_environment_policy.inherit="core"'
              - -c
              - 'shell_environment_policy.ignore_default_excludes=false'
              - -c
              - 'developer_instructions="This is an isolated no-mistakes pipeline stage. Execute the requested stage directly. Do not invoke skills, autoreview, no-mistakes, external reviewers, or nested agents. Do not run tests, builds, linters, or package managers; trusted credential-free steps provide deterministic validation. Never edit files; report required edits as findings. Return the requested structured JSON."'
          EOF
      - name: Run trusted offline test baseline before agent auth
        working-directory: candidate
        run: |
          docker run --rm --pull never \
            --network none \
            --read-only \
            --cap-drop ALL \
            --pids-limit 512 \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,nosuid,nodev,size=1073741824 \
            --mount "type=bind,src=$PWD,dst=/source,readonly" \
            --mount "type=bind,src=$PWD/node_modules,dst=/workspace/node_modules,readonly" \
            --mount type=volume,dst=/workspace \
            --workdir /workspace \
            --env HOME=/tmp/home \
            --env npm_config_cache=/tmp/npm-cache \
            "$DOCKER_IMAGE" sh -lc \
            'mkdir -p "$HOME" && tar -C /source --exclude=./node_modules --exclude=./.git -cf - . | tar --no-same-owner -xf - -C /workspace && npm run typecheck && npm run build && npm run test:scenarios'
          git diff --exit-code
          git diff --cached --exit-code
      # Codex remains read-only and receives no GitHub token. Trusted baseline
      # and lint commands run separately in pinned offline containers.
      - name: Run isolated no-mistakes without publish credentials
        id: gate
        working-directory: candidate
        env:
          CODEX_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HEAD_REF: ${{ needs.prepare.outputs.head_ref }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
          NM_HOME: ${{ runner.temp }}/no-mistakes
          NM_TEST_START_DAEMON: "1"
          NO_MISTAKES_TELEMETRY: "0"
          VET_GATE_DEPS: ${{ github.workspace }}/candidate
        run: >-
          env -u GH_TOKEN -u GITHUB_TOKEN -u AGENT_PAT -u OPENAI_API_KEY
          -u ACTIONS_RUNTIME_TOKEN -u ACTIONS_ID_TOKEN_REQUEST_TOKEN
          -u ACTIONS_ID_TOKEN_REQUEST_URL -u ACTIONS_CACHE_URL
          -u ACTIONS_RESULTS_URL
          node ../trusted/scripts/agent-no-mistakes-gate.mjs
          --run-gate
          --expected-head "$HEAD_SHA"
          --expected-ref "$HEAD_REF"
          --intent-file "$RUNNER_TEMP/no-mistakes-intent"
          --result-file "$RUNNER_TEMP/no-mistakes-result/result.json"
          --repo-dir "$PWD"
          --json
      - name: Upload sanitized gate result
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: no-mistakes-result-${{ inputs.pr-number }}
          path: ${{ runner.temp }}/no-mistakes-result/result.json
          if-no-files-found: ignore
          retention-days: 1
      # Pinned no-mistakes v1.37 uses this isolated detached daemon path to
      # preserve the already-sanitized ephemeral Codex credential environment.
      - name: Stop isolated no-mistakes daemon
        if: ${{ always() }}
        continue-on-error: true
        env:
          NM_HOME: ${{ runner.temp }}/no-mistakes
          NM_TEST_START_DAEMON: "1"
        run: no-mistakes daemon stop --force

  finalize:
    name: finalize no-mistakes
    needs: [prepare, gate]
    if: ${{ always() && needs.prepare.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write
      issues: write
      statuses: write
    steps:
      - uses: actions/checkout@v5
        with:
          ref: main
          persist-credentials: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Download sanitized gate result
        id: download
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: no-mistakes-result-${{ inputs.pr-number }}
          path: ${{ runner.temp }}/no-mistakes-result
      - name: Publish terminal gate state
        env:
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ needs.prepare.outputs.head_sha }}
        run: >-
          node scripts/agent-no-mistakes-gate.mjs
          --pr-number "${{ inputs.pr-number }}"
          --finalize
          --expected-head "$HEAD_SHA"
          --result-file "$RUNNER_TEMP/no-mistakes-result/result.json"
          --json

  dispatch-automerge:
    name: dispatch automerge
    needs:
      - prepare
      - finalize
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Dispatch automerge for the validated pull request
        env:
          GH_TOKEN: ${{ github.token }}
        run: >-
          gh workflow run agent-automerge.yml
          --repo "$GITHUB_REPOSITORY"
          --ref main
          -f pr-number="${{ inputs.pr-number }}"
          -f expected-head-sha="${{ needs.prepare.outputs.head_sha }}"
